# ============================================================
#  Cloud Blog — GitHub Actions CI/CD Workflow
#  Author  : Aayush Abhyankar
#  Purpose : Auto-deploy to Azure Static Web Apps on every
#            push to the main branch
# ============================================================

name: Deploy to Azure Static Web Apps

# ── TRIGGER ─────────────────────────────────────────────────
# Runs automatically when code is pushed to 'main'.
# Also runs on pull requests targeting 'main' (preview deploy).
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# ── JOBS ────────────────────────────────────────────────────
jobs:

  # ── JOB 1: BUILD & DEPLOY ─────────────────────────────────
  build_and_deploy:
    # Only run deploy on push OR on a PR that is NOT closed.
    # Closed PRs trigger a cleanup job (handled by Azure automatically).
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    runs-on: ubuntu-latest   # Use the latest Ubuntu runner

    name: Build and Deploy

    steps:

      # ── STEP 1: Checkout ──────────────────────────────────
      # Downloads your repository code onto the runner machine.
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true       # Include git submodules if any
          lru-cache: false       # Ensure a clean fetch every time

      # ── STEP 2: Validate HTML files ───────────────────────
      # Basic check — confirm all expected HTML files exist
      # before attempting a deployment.
      - name: Validate Project Files
        run: |
          echo "=== Validating project structure ==="
          echo "Checking required files..."

          files=(
            "index.html"
            "about.html"
            "css/style.css"
            "blog/linux-journey.html"
            "blog/docker-getting-started.html"
            "blog/cloud-computing-intro.html"
          )

          all_ok=true
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✔  $f"
            else
              echo "  ✘  MISSING: $f"
              all_ok=false
            fi
          done

          if [ "$all_ok" = false ]; then
            echo "Validation failed — one or more required files are missing."
            exit 1
          fi

          echo ""
          echo "=== File sizes ==="
          find . -name "*.html" -o -name "*.css" | sort | xargs ls -lh 2>/dev/null | awk '{print $5, $9}'

          echo ""
          echo "All files validated successfully ✔"

      # ── STEP 3: Deploy to Azure Static Web Apps ───────────
      # This official Microsoft action handles the entire
      # deployment process to Azure Static Web Apps.
      # It zips the files, uploads them to Azure, and
      # publishes them to the CDN automatically.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Secret token generated by Azure when you create
          # the Static Web App resource. Stored in GitHub
          # repository Settings → Secrets → Actions.
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

          # GitHub token for PR preview environment management.
          # Available automatically — no setup needed.
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          # 'upload' deploys the site.
          # 'close' removes PR preview environments.
          action: "upload"

          # Root of your website — where index.html lives.
          # '/' means the repository root.
          app_location: "/"

          # No build output folder needed for a static site
          # (no npm build step). Leave blank.
          output_location: ""

          # No API / backend functions used in this project.
          api_location: ""

      # ── STEP 4: Confirm Deployment ────────────────────────
      # Print a summary to the Actions log so you can verify
      # everything worked at a glance.
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  Deployment Complete!"
          echo "============================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Author  : ${{ github.actor }}"
          echo "  Run ID  : ${{ github.run_id }}"
          echo "============================================"
          echo "  Your site is live on Azure Static Web Apps"
          echo "============================================"

  # ── JOB 2: CLOSE PR ENVIRONMENT ──────────────────────────
  # When a pull request is closed/merged, Azure automatically
  # removes the temporary preview environment it created.
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Preview

    steps:
      - name: Close Preview Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "close"
          app_location: "/"
